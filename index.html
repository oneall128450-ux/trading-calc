<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حاسبة التداول">
    
    <!-- أيقونة التطبيق (اللوجو) -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/chart-line.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/chart-line.png">

    <title>حاسبة التداول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group input {
            background: #1e293b;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #10b981;
            background: #0f172a;
            outline: none;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tap-feedback:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- قسم اللوجو -->
        <div class="mb-6 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 mb-3">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 17l6-6 4 4 8-8"></path>
                    <polyline points="14 7 21 7 21 14"></polyline>
                </svg>
            </div>
            <h1 class="text-2xl font-black text-white">حاسبة التداول</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold tracking-widest">النسخة الاحترافية (بدون إنترنت)</p>
        </div>

        <div class="glass-card">
            <div class="space-y-5">
                <!-- إدخال القيمة -->
                <div class="input-group">
                    <label class="block text-xs font-bold text-slate-400 mb-2 mr-1">المبلغ / سعر الدخول</label>
                    <input type="number" id="amount" placeholder="اكتب هنا القيمة" 
                           class="w-full rounded-2xl px-5 py-4 text-xl text-left font-bold text-emerald-400" dir="ltr">
                </div>

                <!-- إدخال النسبة -->
                <div class="input-group">
                    <label class="block text-xs font-bold text-slate-400 mb-2 mr-1">النسبة المئوية</label>
                    <div class="relative">
                        <input type="number" id="percent" placeholder="" 
                               class="w-full rounded-2xl px-5 py-4 text-xl text-left font-bold text-emerald-400" dir="ltr">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-emerald-600 font-black text-xl">%</span>
                    </div>
                </div>

                <!-- أزرار سريعة -->
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setP(1)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700">1%</button>
                    <button onclick="setP(3)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700">3%</button>
                    <button onclick="setP(5)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700">5%</button>
                    <button onclick="setP(10)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700">10%</button>
                </div>

                <!-- عرض النتائج -->
                <div class="space-y-3 pt-2">
                    <div class="bg-slate-900/50 rounded-2xl p-4 text-center border border-white/5">
                        <span class="text-[10px] text-slate-500 block mb-1">قيمة النسبة الصافية</span>
                        <div id="res-val" class="text-2xl font-black text-emerald-400">0.00</div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div onclick="copyText('res-plus')" class="tap-feedback bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4 text-center cursor-pointer">
                            <span class="text-[10px] text-emerald-500 block mb-1 font-bold">هدف الربح (+)</span>
                            <div id="res-plus" class="text-lg font-black text-emerald-400">0.00</div>
                        </div>
                        <div onclick="copyText('res-minus')" class="tap-feedback bg-rose-500/10 border border-rose-500/20 rounded-2xl p-4 text-center cursor-pointer">
                            <span class="text-[10px] text-rose-500 block mb-1 font-bold">وقف الخسارة (-)</span>
                            <div id="res-minus" class="text-lg font-black text-rose-400">0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-8 text-[10px] text-slate-600 font-bold uppercase tracking-widest italic">V 4.0 | التحديث النهائي</p>
        
        <!-- تنبيه النسخ -->
        <div id="toast" class="fixed bottom-8 bg-emerald-500 text-white px-8 py-3 rounded-full font-bold shadow-2xl opacity-0 transition-all pointer-events-none transform translate-y-4">
            تم نسخ السعر ✅
        </div>
    </div>

    <script>
        const aE = document.getElementById('amount'), 
              pE = document.getElementById('percent'), 
              rV = document.getElementById('res-val'), 
              rP = document.getElementById('res-plus'), 
              rM = document.getElementById('res-minus'), 
              t = document.getElementById('toast');

        // تنسيق ذكي للأرقام حسب قيمتها
        function fmt(n) {
            if (n === 0) return "0.00";
            let f = n < 1 ? 6 : 2;
            return n.toLocaleString('en-US', { minimumFractionDigits: f, maximumFractionDigits: f });
        }

        function calc() {
            const a = parseFloat(aE.value) || 0;
            const p = parseFloat(pE.value) || 0;
            if (a > 0) {
                const d = (p/100) * a;
                rV.innerText = fmt(d);
                rP.innerText = fmt(a + d);
                rM.innerText = fmt(a - d);
            } else {
                rV.innerText = "0.00"; rP.innerText = "0.00"; rM.innerText = "0.00";
            }
        }

        function setP(v) { pE.value = v; calc(); }

        function copyText(id) {
            const v = document.getElementById(id).innerText.replace(/,/g, '');
            if (v === "0.00") return;
            navigator.clipboard.writeText(v).then(() => {
                t.style.opacity = '1';
                t.style.transform = 'translateY(0)';
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translateY(16px)';
                }, 1500);
            });
        }

        aE.addEventListener('input', calc);
        pE.addEventListener('input', calc);
        window.onload = () => aE.focus();
    </script>
</body>
</html>

```
