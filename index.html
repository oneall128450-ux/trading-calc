<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حاسبة التداول">
    
    <!-- أيقونة التطبيق (SVG) لتعمل بدون إنترنت -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2310b981'/><path d='M30 70 L45 50 L60 60 L75 30' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='75' cy='30' r='5' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2310b981'/><path d='M30 70 L45 50 L60 60 L75 30' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='75' cy='30' r='5' fill='white'/></svg>">

    <title>حاسبة التداول الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --accent: #10b981;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: #f8fafc;
            margin: 0;
            overflow: hidden; /* لمنع السكرول المزعج في وضع التطبيق */
            touch-action: manipulation;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group input {
            background: #1e293b;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent);
            background: #0f172a;
            outline: none;
        }

        /* اخفاء أسهم الأرقام */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tap-feedback:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Logo Section -->
        <div class="mb-6 flex flex-col items-center">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 mb-3">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"></path><polyline points="14 7 21 7 21 14"></polyline></svg>
            </div>
            <h1 class="text-2xl font-black text-white">حاسبة التداول</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">Offline Pro Edition</p>
        </div>

        <div class="glass-card">
            <div class="space-y-5">
                <!-- المبلغ -->
                <div class="input-group">
                    <label class="block text-xs font-bold text-slate-400 mb-2 mr-1">المبلغ / سعر الدخول</label>
                    <input type="number" id="amount" placeholder="اكتب هنا القيمة" 
                           class="w-full rounded-2xl px-5 py-4 text-xl text-left font-bold text-emerald-400" dir="ltr">
                </div>

                <!-- النسبة -->
                <div class="input-group">
                    <label class="block text-xs font-bold text-slate-400 mb-2 mr-1">النسبة المئوية</label>
                    <div class="relative">
                        <input type="number" id="percent" placeholder="0" 
                               class="w-full rounded-2xl px-5 py-4 text-xl text-left font-bold text-emerald-400" dir="ltr">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-emerald-600 font-black text-xl">%</span>
                    </div>
                </div>

                <!-- الأزرار -->
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setP(1)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700 hover:bg-slate-700">1%</button>
                    <button onclick="setP(3)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700 hover:bg-slate-700">3%</button>
                    <button onclick="setP(5)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700 hover:bg-slate-700">5%</button>
                    <button onclick="setP(10)" class="tap-feedback bg-slate-800 py-3 rounded-xl text-xs font-bold border border-slate-700 hover:bg-slate-700">10%</button>
                </div>

                <!-- النتائج -->
                <div class="space-y-3 pt-2">
                    <div class="bg-slate-900/50 rounded-2xl p-4 text-center border border-white/5">
                        <span class="text-[10px] text-slate-500 block mb-1">قيمة النسبة</span>
                        <div id="res-val" class="text-2xl font-black text-emerald-400">0.00</div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div onclick="copyText('res-plus')" class="tap-feedback bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4 text-center cursor-pointer">
                            <span class="text-[10px] text-emerald-500 block mb-1 font-bold">هدف الربح</span>
                            <div id="res-plus" class="text-lg font-black text-emerald-400">0.00</div>
                        </div>
                        <div onclick="copyText('res-minus')" class="tap-feedback bg-rose-500/10 border border-rose-500/20 rounded-2xl p-4 text-center cursor-pointer">
                            <span class="text-[10px] text-rose-500 block mb-1 font-bold">وقف الخسارة</span>
                            <div id="res-minus" class="text-lg font-black text-rose-400">0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-8 text-[10px] text-slate-600 font-bold uppercase tracking-widest italic">V 4.0 | No Internet Required</p>
        
        <div id="toast" class="fixed bottom-8 bg-emerald-500 text-white px-8 py-3 rounded-full font-bold shadow-2xl opacity-0 transition-all pointer-events-none transform translate-y-4">
            تم النسخ ✅
        </div>
    </div>

    <script>
        const amountEl = document.getElementById('amount');
        const percentEl = document.getElementById('percent');
        const resVal = document.getElementById('res-val');
        const resPlus = document.getElementById('res-plus');
        const resMinus = document.getElementById('res-minus');
        const toast = document.getElementById('toast');

        function format(n) {
            if (n === 0) return "0.00";
            let f = n < 1 ? 6 : 2;
            return n.toLocaleString('en-US', { minimumFractionDigits: f, maximumFractionDigits: f });
        }

        function calc() {
            const a = parseFloat(amountEl.value) || 0;
            const p = parseFloat(percentEl.value) || 0;
            if (a > 0) {
                const d = (p/100) * a;
                resVal.innerText = format(d);
                resPlus.innerText = format(a + d);
                resMinus.innerText = format(a - d);
            } else {
                resVal.innerText = "0.00";
                resPlus.innerText = "0.00";
                resMinus.innerText = "0.00";
            }
        }

        function setP(v) {
            percentEl.value = v;
            calc();
        }

        function copyText(id) {
            const val = document.getElementById(id).innerText.replace(/,/g, '');
            if (val === "0.00") return;
            navigator.clipboard.writeText(val).then(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(16px)';
                }, 1500);
            });
        }

        amountEl.addEventListener('input', calc);
        percentEl.addEventListener('input', calc);
        window.onload = () => amountEl.focus();
    </script>
</body>
</html>
